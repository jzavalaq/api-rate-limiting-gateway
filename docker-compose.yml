version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - RATE_LIMIT_RPM=${RATE_LIMIT_RPM:-60}
      - RATE_LIMIT_RPH=${RATE_LIMIT_RPH:-1000}
      - SERVICES_USER_URL=${SERVICES_USER_URL:-http://user-service:8081}
      - SERVICES_ORDER_URL=${SERVICES_ORDER_URL:-http://order-service:8082}
      - SERVICES_PRODUCT_URL=${SERVICES_PRODUCT_URL:-http://product-service:8083}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - gateway-network

  # Example backend services (uncomment and configure as needed)
  # user-service:
  #   image: your-user-service:latest
  #   ports:
  #     - "8081:8081"
  #   networks:
  #     - gateway-network

  # order-service:
  #   image: your-order-service:latest
  #   ports:
  #     - "8082:8082"
  #   networks:
  #     - gateway-network

  # product-service:
  #   image: your-product-service:latest
  #   ports:
  #     - "8083:8083"
  #   networks:
  #     - gateway-network

networks:
  gateway-network:
    driver: bridge
