name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  JWT_SECRET: test-secret-key-for-ci-pipeline-minimum-32-characters-long

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build and test
      run: mvn verify -B --no-transfer-progress

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: target/surefire-reports/

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: target/site/jacoco/

  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t api-rate-limiting-gateway:${{ github.sha }} .

    - name: Test Docker image starts
      run: |
        docker run -d --name test-container \
          -e SPRING_PROFILES_ACTIVE=dev \
          -e JWT_SECRET=test-secret-key-for-docker-test-minimum-32-characters \
          -p 8080:8080 api-rate-limiting-gateway:${{ github.sha }}
        sleep 20
        curl -f http://localhost:8080/actuator/health || exit 1
        docker stop test-container
        docker rm test-container

    - name: Login to Docker Hub (if on main)
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker image (if on main)
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        docker tag api-rate-limiting-gateway:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/api-rate-limiting-gateway:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/api-rate-limiting-gateway:latest

  dependency-check:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Run OWASP Dependency Check
      run: mvn org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7 || true
      continue-on-error: true

    - name: Upload dependency check report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: dependency-check-report
        path: target/dependency-check-report.html
