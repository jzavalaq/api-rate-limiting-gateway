# API Gateway Configuration
spring.application.name=api-rate-limiting-gateway
server.port=${PORT:8080}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Actuator Configuration
management.endpoint.health.show-details=when_authorized
management.endpoints.web.exposure.include=health,info,metrics

# JWT Configuration
jwt.secret=${JWT_SECRET:default-dev-secret-key-change-in-production-must-be-at-least-256-bits-long}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Rate Limiting Configuration
rate.limit.requests-per-minute=${RATE_LIMIT_RPM:60}
rate.limit.requests-per-hour=${RATE_LIMIT_RPH:1000}

# Backend Service URLs
services.user.url=${SERVICES_USER_URL:http://localhost:8081}
services.order.url=${SERVICES_ORDER_URL:http://localhost:8082}
services.product.url=${SERVICES_PRODUCT_URL:http://localhost:8083}

# Circuit Breaker Configuration
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3

# Logging Configuration
logging.level.root=INFO
logging.level.com.gateway=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# CORS Configuration
allowed.origins=${ALLOWED_ORIGINS:http://localhost:3000}

# Response Compression
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/xml,text/plain
server.compression.min-response-size=1024
