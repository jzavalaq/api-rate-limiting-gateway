# Production Profile Configuration
# Stateless API Gateway - No database required

spring:
  config:
    activate:
      on-profile: prod

# Production logging
logging:
  level:
    root: WARN
    com.gateway.ratelimit: INFO

# Production rate limits
rate:
  limit:
    requests-per-minute: 60
    requests-per-hour: 1000

# Production JWT settings - REQUIRED: Must be set via environment variable
jwt:
  secret: ${JWT_SECRET}  # REQUIRED: Must be set via environment variable (no default)
  expiration: ${JWT_EXPIRATION:86400000}

# CORS - MUST be explicitly configured in production
allowed:
  origins: ${ALLOWED_ORIGINS}  # REQUIRED: Must be set via environment variable

# Production actuator settings
management:
  endpoint:
    health:
      show-details: never
  endpoints:
    web:
      exposure:
        include: health,info
