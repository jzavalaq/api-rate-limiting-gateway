# Development Profile Configuration
spring:
  config:
    activate:
      on-profile: dev

  # H2 Database Configuration
  datasource:
    url: jdbc:h2:mem:gatewaydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # H2 Console (dev only)
  h2:
    console:
      enabled: true
      path: /h2-console

  # Disable Flyway in dev (use ddl-auto)
  flyway:
    enabled: false

# Dev-specific logging
logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.cloud.gateway: DEBUG

# Dev rate limits (higher for testing)
rate:
  limit:
    requests-per-minute: 120
    requests-per-hour: 2000
