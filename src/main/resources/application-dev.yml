# Development Profile Configuration
# Stateless API Gateway - No database required

spring:
  config:
    activate:
      on-profile: dev

# Dev-specific logging
logging:
  level:
    root: INFO
    com.gateway.ratelimit: DEBUG
    org.springframework.security: DEBUG
    org.springframework.cloud.gateway: DEBUG

# Dev rate limits (higher for testing)
rate:
  limit:
    requests-per-minute: 120
    requests-per-hour: 2000

# Development JWT settings
jwt:
  secret: ${JWT_SECRET:dev-secret-key-for-development-only-must-be-at-least-256-bits-long}
  expiration: ${JWT_EXPIRATION:86400000}

# CORS - permissive for development
allowed:
  origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
