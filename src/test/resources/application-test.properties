# Test Configuration
spring.application.name=api-rate-limiting-gateway-test
server.port=0

# JWT Configuration for Tests
jwt.secret=this-is-a-test-secret-key-that-is-at-least-256-bits-long-for-testing-purposes
jwt.expiration=86400000

# Rate Limiting Configuration for Tests
rate.limit.requests-per-minute=60
rate.limit.requests-per-hour=1000

# CORS Configuration for Tests
allowed.origins=http://localhost:3000,http://localhost:8080

# Logging Configuration
logging.level.root=WARN
logging.level.com.gateway=DEBUG

# Disable unnecessary features in tests
spring.main.allow-bean-definition-overriding=true
